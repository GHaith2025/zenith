/* ============================= Achievements (Badges) ============================= */

function computeStats({ habits, goals, tasks, pomodoroStats, frog, weeklyReviewLog }) {
  const focusHours = pomodoroStats.sessions.length * 25 / 60;
  const bestStreak = habits.reduce((max, h) => Math.max(max, computeStreak(h.log)), 0);
  const completedKRs = goals.flatMap((g) => g.krs).filter((k) => k.progress >= 100).length;
  const frogsEaten = tasks.length ? 0 : 0; // placeholder, real count tracked via frog history not stored historically
  const doneTasks = tasks.filter((t) => t.stage === "done").length;
  const weeklyReviews = weeklyReviewLog.length;
  return { focusHours, bestStreak, completedKRs, frogsEaten, doneTasks, weeklyReviews };
}

function AchievementsSection({ habits, goals, tasks, pomodoroStats, frog, weeklyReviewLog, points }) {
  const stats = computeStats({ habits, goals, tasks, pomodoroStats, frog, weeklyReviewLog });
  const unlocked = BADGES.filter((b) => b.check(stats));
  const locked = BADGES.filter((b) => !b.check(stats));
  const level = Math.floor(points / 200) + 1;

  return (
    <div>
      <SectionHeader eyebrow="Achievements" title="الإنجازات والشارات" desc="كل التزام يُبنى عليه — هذه علامات رحلتك حتى الآن." />

      <Card className="p-6 mb-6 flex items-center gap-5">
        <div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-[#4ADE9E] to-[#2BB682] flex items-center justify-center shrink-0">
          <span className="font-display text-2xl font-bold text-[#0F1115]">{level}</span>
        </div>
        <div>
          <div className="text-sm text-[#8B92A5]">مستواك الحالي</div>
          <div className="font-display text-xl font-bold">{points} نقطة</div>
          <div className="text-xs text-[#5C6376] mt-1">{unlocked.length} من {BADGES.length} شارة مفتوحة</div>
        </div>
      </Card>

      {unlocked.length > 0 && (
        <div className="mb-6">
          <div className="text-xs text-[#4ADE9E] font-medium mb-3">مفتوحة</div>
          <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
            {unlocked.map((b) => (
              <Card key={b.id} className="p-4 text-center border-[#26402F]">
                <div className="text-3xl mb-2">{b.icon}</div>
                <div className="text-sm font-medium">{b.label}</div>
                <div className="text-[11px] text-[#5C6376] mt-1 leading-relaxed">{b.desc}</div>
              </Card>
            ))}
          </div>
        </div>
      )}

      {locked.length > 0 && (
        <div>
          <div className="text-xs text-[#5C6376] font-medium mb-3 flex items-center gap-1.5"><Lock size={11} /> مقفلة بعد</div>
          <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
            {locked.map((b) => (
              <Card key={b.id} className="p-4 text-center opacity-50">
                <div className="text-3xl mb-2 grayscale">{b.icon}</div>
                <div className="text-sm font-medium">{b.label}</div>
                <div className="text-[11px] text-[#5C6376] mt-1 leading-relaxed">{b.desc}</div>
              </Card>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================= Community / Challenges (local, single-device) ============================= */

function CommunitySection({ challenges, setChallenges, habits, addPoints }) {
  const [adding, setAdding] = useState(false);
  const [title, setTitle] = useState("");
  const [days, setDays] = useState(30);
  const [linkedHabitId, setLinkedHabitId] = useState("");

  function createChallenge() {
    if (!title.trim()) return;
    setChallenges((cs) => [...cs, { id: uid(), title: title.trim(), days, startDate: todayISO(), checkins: [], habitId: linkedHabitId || null }]);
    setTitle(""); setLinkedHabitId(""); setAdding(false);
  }

  function checkIn(id) {
    setChallenges((cs) => cs.map((c) => {
      if (c.id !== id) return c;
      if (c.checkins.includes(todayISO())) return c;
      addPoints(5);
      return { ...c, checkins: [...c.checkins, todayISO()] };
    }));
  }

  function removeChallenge(id) {
    setChallenges((cs) => cs.filter((c) => c.id !== id));
  }

  return (
    <div>
      <SectionHeader
        eyebrow="Community"
        title="التحديات"
        desc="تحديات شخصية بنمط 30 يومًا لبناء زخم — نسخة فردية تعمل على جهازك، بلا مشاركة مع مستخدمين آخرين حاليًا."
        action={
          <button onClick={() => setAdding(true)} className="flex items-center gap-1.5 text-sm bg-[#1B2B24] text-[#4ADE9E] px-4 py-2.5 rounded-xl hover:bg-[#1F3129] transition-colors font-medium shrink-0">
            <Plus size={16} /> تحدٍ جديد
          </button>
        }
      />

      <Card className="p-4 mb-6 flex items-center gap-3 bg-[#171D1A] border-[#1F2B22]">
        <Users size={16} className="text-[#4ADE9E] shrink-0" />
        <p className="text-xs text-[#8B92A5] leading-relaxed">هذه نسخة شخصية للتحديات تُخزَّن على جهازك فقط. مشاركة التحديات مع مستخدمين آخرين تحتاج خادمًا مركزيًا — أخبرني إن أردت إضافته لاحقًا.</p>
      </Card>

      {adding && (
        <Card className="p-5 mb-6">
          <div className="grid sm:grid-cols-2 gap-3 mb-3">
            <Field label="اسم التحدي" value={title} onChange={(e) => setTitle(e.target.value)} placeholder="مثال: 30 يوم قراءة يومية" />
            <label className="block">
              <span className="text-xs text-[#5C6376] mb-1.5 block">المدة (أيام)</span>
              <input type="number" value={days} onChange={(e) => setDays(Number(e.target.value))} className="w-full bg-[#0F1115] border border-[#262B36] rounded-xl px-3.5 py-2.5 text-sm outline-none focus:border-[#4ADE9E]" />
            </label>
          </div>
          {habits.length > 0 && (
            <label className="block mb-3">
              <span className="text-xs text-[#5C6376] mb-1.5 block">اربطه بعادة قائمة (اختياري)</span>
              <select value={linkedHabitId} onChange={(e) => setLinkedHabitId(e.target.value)} className="w-full bg-[#0F1115] border border-[#262B36] rounded-xl px-3.5 py-2.5 text-sm outline-none">
                <option value="">بلا ربط</option>
                {habits.map((h) => <option key={h.id} value={h.id}>{h.name}</option>)}
              </select>
            </label>
          )}
          <div className="flex gap-2">
            <button onClick={createChallenge} className="px-4 py-2.5 rounded-xl bg-[#4ADE9E] text-[#0F1115] text-sm font-medium">إنشاء</button>
            <button onClick={() => setAdding(false)} className="px-4 py-2.5 rounded-xl text-[#5C6376] text-sm">إلغاء</button>
          </div>
        </Card>
      )}

      {challenges.length === 0 && !adding ? (
        <EmptyState icon={Users} title="لا تحديات بعد" desc="أنشئ تحديك الأول وابدأ العد." />
      ) : (
        <div className="space-y-4">
          {challenges.map((c) => {
            const doneToday = c.checkins.includes(todayISO());
            const dayNumber = Math.min(c.days, Math.floor((Date.now() - new Date(c.startDate + "T00:00:00").getTime()) / 86400000) + 1);
            const pct = Math.round((c.checkins.length / c.days) * 100);
            return (
              <Card key={c.id} className="p-6">
                <div className="flex items-start justify-between gap-3 mb-3">
                  <div>
                    <h3 className="font-medium text-[15px]">{c.title}</h3>
                    <div className="text-xs text-[#5C6376] mt-0.5">اليوم {dayNumber} من {c.days}</div>
                  </div>
                  <button onClick={() => removeChallenge(c.id)} className="text-[#3A4152] hover:text-[#E8615F] transition-colors p-1"><Trash2 size={14} /></button>
                </div>
                <ProgressBar value={pct} color="#4ADE9E" />
                <div className="flex items-center justify-between mt-4">
                  <span className="text-xs text-[#5C6376]">{c.checkins.length} تسجيل حضور</span>
                  <button
                    onClick={() => checkIn(c.id)}
                    disabled={doneToday}
                    className={`text-xs px-4 py-2 rounded-xl font-medium transition-colors ${doneToday ? "bg-[#1B2B24] text-[#4ADE9E]" : "bg-[#4ADE9E] text-[#0F1115] hover:bg-[#3ECB8C]"}`}
                  >
                    {doneToday ? "تم اليوم ✓" : "سجّل حضور اليوم"}
                  </button>
                </div>
              </Card>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ============================= AI Assistant (rule-based demo) ============================= */

function AISection({ setGoals, setHabits, setTasks, setOneThing, setFrog, setRoute, addPoints }) {
  const [input, setInput] = useState("");
  const [messages, setMessages] = useState([
    { role: "ai", text: "أخبرني بهدفك أو تحديك الحالي، وسأحوّله فورًا إلى خطة عمل: هدف OKR، مهمة واحدة، عادات، ومهام مرتبة — دون أن تفتح كتابًا واحدًا." },
  ]);

  function handleSend() {
    if (!input.trim()) return;
    const userMsg = input.trim();
    setMessages((m) => [...m, { role: "user", text: userMsg }]);
    setInput("");

    // Simple rule-based plan generation (offline demo of the "AI engine" described in the brief)
    setTimeout(() => {
      const plan = generatePlan(userMsg);
      applyPlan(plan);
      setMessages((m) => [...m, { role: "ai", text: plan.summary, plan }]);
      addPoints(25);
    }, 500);
  }

  function applyPlan(plan) {
    if (plan.goal) {
      setGoals((gs) => [...gs, { id: uid(), title: plan.goal, krs: plan.krs.map((t) => ({ id: uid(), text: t, progress: 0 })) }]);
    }
    if (plan.oneThing) {
      setOneThing({ text: plan.oneThing, done: false, date: todayISO() });
    }
    if (plan.habits?.length) {
      setHabits((hs) => [...hs, ...plan.habits.map((name) => ({
        id: uid(), name, identity: "", why: "مقترح لدعم هدفك الجديد", cue: "", time: "", place: "", reward: "", minVersion: "", log: [],
      }))]);
    }
    if (plan.tasks?.length) {
      setTasks((ts) => [...ts, ...plan.tasks.map((text) => ({ id: uid(), text, stage: "next", context: "@عمل", createdAt: todayISO() }))]);
    }
  }

  return (
    <div>
      <SectionHeader
        eyebrow="AI Engine"
        title="المساعد الذكي"
        desc="صف هدفك أو مشكلتك بجملة واحدة، ودع النظام يطبّق أفكار الكتب الثمانية تلقائيًا."
      />

      <Card className="p-0 overflow-hidden flex flex-col" style={{ height: "min(65vh, 560px)" }}>
        <div className="flex-1 overflow-y-auto p-5 space-y-4">
          {messages.map((m, i) => (
            <div key={i} className={`flex ${m.role === "user" ? "justify-start" : "justify-end"}`}>
              <div className={`max-w-[85%] rounded-2xl px-4 py-3 text-sm leading-relaxed ${
                m.role === "user" ? "bg-[#1D212B] text-[#D5D8E0]" : "bg-[#1B2B24] text-[#DFF5EA] border border-[#26402F]"
              }`}>
                {m.text}
                {m.plan && <PlanCard plan={m.plan} setRoute={setRoute} />}
              </div>
            </div>
          ))}
        </div>
        <div className="p-4 border-t border-[#1D212B] flex gap-2">
          <input
            value={input}
            onChange={(e) => setInput(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && handleSend()}
            placeholder="مثال: عندي امتحان بعد أسبوع ولا أعرف من أين أبدأ"
            className="flex-1 bg-[#0F1115] border border-[#262B36] rounded-xl px-4 py-2.5 text-sm outline-none focus:border-[#4ADE9E] transition-colors"
          />
          <button onClick={handleSend} className="w-11 h-11 rounded-xl bg-[#4ADE9E] flex items-center justify-center shrink-0">
            <ArrowRight size={17} className="text-[#0F1115] rotate-180" />
          </button>
        </div>
      </Card>
    </div>
  );
}

function PlanCard({ plan, setRoute }) {
  return (
    <div className="mt-3 space-y-2 text-[#B8BCC8]">
      {plan.oneThing && (
        <div className="flex items-center gap-2"><CircleDot size={13} className="text-[#4ADE9E] shrink-0" /><span className="text-xs">المهمة الواحدة: {plan.oneThing}</span></div>
      )}
      {plan.krs?.length > 0 && (
        <div className="flex items-start gap-2"><Target size={13} className="text-[#7DA8FF] shrink-0 mt-0.5" /><span className="text-xs">{plan.krs.length} نتائج رئيسية أُضيفت لهدف جديد</span></div>
      )}
      {plan.habits?.length > 0 && (
        <div className="flex items-start gap-2"><Repeat size={13} className="text-[#C792EA] shrink-0 mt-0.5" /><span className="text-xs">{plan.habits.length} عادات مقترحة أُضيفت</span></div>
      )}
      {plan.tasks?.length > 0 && (
        <div className="flex items-start gap-2"><CheckCircle2 size={13} className="text-[#F0A860] shrink-0 mt-0.5" /><span className="text-xs">{plan.tasks.length} مهام رُتبت كإجراءات تالية</span></div>
      )}
      <button onClick={() => setRoute("dashboard")} className="text-xs text-[#4ADE9E] mt-2 flex items-center gap-1">
        عرض في اللوحة الرئيسية <ChevronLeft size={12} />
      </button>
    </div>
  );
}

function generatePlan(text) {
  // Lightweight heuristic plan generator — simulates applying the 8 books' frameworks
  const lower = text.toLowerCase();
  const isExam = /امتحان|اختبار|exam/.test(text);
  const isCareer = /وظيف|عمل|مطور|مهنة|career|job/.test(text);
  const isHealth = /صحة|رياض|وزن|health|fitness/.test(text);

  let goal, krs = [], habits = [], tasks = [], oneThing;

  if (isExam) {
    goal = "التفوق في الامتحان القادم";
    krs = ["مراجعة كامل المنهج", "حل 3 نماذج امتحانات سابقة", "تلخيص كل فصل في صفحة واحدة"];
    habits = ["مراجعة يومية 45 دقيقة", "نوم 7 ساعات كل ليلة"];
    tasks = ["جدولة خطة مراجعة أسبوعية", "تحديد الفصول الأصعب أولاً"];
    oneThing = "البدء بمراجعة الفصل الأصعب اليوم";
  } else if (isCareer) {
    goal = text.length < 60 ? text : "تطوير مسار مهني جديد";
    krs = ["تحديث السيرة الذاتية", "التقديم على 10 فرص هذا الشهر", "بناء مهارة جديدة أساسية"];
    habits = ["تعلم مهارة مهنية 30 دقيقة يوميًا", "التواصل مع شخص جديد في المجال أسبوعيًا"];
    tasks = ["تحديث الملف الشخصي على LinkedIn", "إعداد قائمة بالشركات المستهدفة"];
    oneThing = "تحديث السيرة الذاتية اليوم";
  } else if (isHealth) {
    goal = "تحسين الصحة العامة";
    krs = ["ممارسة الرياضة 4 مرات أسبوعيًا", "شرب 2 لتر ماء يوميًا", "نوم منتظم 7-8 ساعات"];
    habits = ["تمرين صباحي 15 دقيقة", "وجبة صحية واحدة إضافية يوميًا"];
    tasks = ["حجز اشتراك نادي أو خطة منزلية", "إعداد قائمة تسوق صحية"];
    oneThing = "ممارسة أول تمرين اليوم";
  } else {
    goal = text.length < 60 ? text : "تحقيق هذا الهدف الجديد";
    krs = ["تحديد الخطوة الأولى بوضوح", "تخصيص وقت أسبوعي ثابت", "قياس التقدم كل أسبوع"];
    habits = ["جلسة عمل يومية 25 دقيقة على هذا الهدف"];
    tasks = ["تقسيم الهدف إلى مهام صغيرة", "تحديد أول إجراء قابل للتنفيذ الآن"];
    oneThing = "تنفيذ أول خطوة صغيرة الآن";
  }

  const summary = `حللت طلبك وحولته لخطة عملية: أنشأت هدفًا بـ ${krs.length} نتائج رئيسية، حددت "${oneThing}" كمهمتك الواحدة اليوم، واقترحت ${habits.length} عادات و ${tasks.length} مهام مرتبة. كل هذا مطبّق الآن في نظامك — بلا حاجة لقراءة كتاب.`;

  return { goal, krs, habits, tasks, oneThing, summary };
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
